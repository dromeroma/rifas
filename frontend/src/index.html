  <!-- Evita el flash del nombre del ícono como texto plano antes de que
       cargue la fuente Material Icons. Se activa con clase en body. -->
  <style>
    body:not(.icons-ready) .material-icons { visibility: hidden; }

    /* ============================================================
       PRE-BOOTSTRAP SPLASH para landing pages públicas (/r/:id, /rifa/:id)
       Las rutas escaneadas desde QR físico se abren en webviews lentos
       de WhatsApp/Instagram. El bundle Angular tarda en cargar y mientras
       tanto el body sale negro (color base del admin). Resultado: el
       usuario que escanea el QR ve una pantalla negra y cierra antes de
       que la app monte.

       Fix: para rutas públicas, mostrar splash claro INMEDIATO con el
       branding y un loading. Cuando Angular monta y reemplaza <app-root>,
       el splash desaparece naturalmente. Para rutas de admin, no hacemos
       nada (sigue el bg dark normal).
       ============================================================ */
    .public-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: linear-gradient(180deg, #faf6ee 0%, #f0e5c8 100%);
      color: #1a2942;
      font-family: 'Inter', system-ui, sans-serif;
      z-index: 0;
    }
    .public-splash__brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }
    .public-splash__dot {
      width: 12px; height: 12px;
      background: #1ec77b;
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(30, 199, 123, 0.2);
    }
    .public-splash__loader {
      width: 36px; height: 36px;
      border: 3px solid rgba(26, 41, 66, 0.12);
      border-top-color: #c9a96e;
      border-radius: 50%;
      animation: public-spin 0.8s linear infinite;
    }
    .public-splash__msg {
      font-size: 13px;
      color: rgba(26, 41, 66, 0.65);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
    @keyframes public-spin { to { transform: rotate(360deg); } }
    /* Cuando Angular monta, agrega .booted al body y el splash se oculta */
    body.booted .public-splash { display: none; }
  </style>
  <script>
    (function () {
      function markReady() {
        if (document.body) document.body.classList.add('icons-ready');
      }
      function setup() {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(markReady);
          setTimeout(markReady, 1500);
        } else {
          setTimeout(markReady, 1000);
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }

      // Marca body.booted cuando Angular renderiza algo dentro de app-root,
      // para ocultar el splash pre-bootstrap. Usa MutationObserver para
      // detectar el primer hijo agregado al app-root.
      var bootedObserver = null;
      function watchBoot() {
        var root = document.querySelector('app-root');
        if (!root) { setTimeout(watchBoot, 100); return; }
        if (root.children && root.children.length > 0) {
          document.body.classList.add('booted');
          return;
        }
        bootedObserver = new MutationObserver(function () {
          if (root.children && root.children.length > 0) {
            document.body.classList.add('booted');
            bootedObserver.disconnect();
          }
        });
        bootedObserver.observe(root, { childList: true });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', watchBoot);
      } else {
        watchBoot();
      }
    })();
  </script>

  <!-- ============================================================
       AUTO-RECOVERY del cache obsoleto.
       Problema: cuando hacemos deploy, los chunks JS cambian de hash.
       Si el browser del usuario tiene cacheado un index.html viejo
       (referencia chunks que ya no existen), todos los chunks dan
       404 → Angular no bootstrappea → splash queda eternamente.
       El usuario "limpia cache" pero a veces no es suficiente (PWA,
       service worker, etc.).

       Fix: si después de 8 segundos Angular no ha bootstrappeado, o
       si detectamos un error específico de carga de chunk, limpiamos
       agresivamente cache + service workers + caches API y recargamos
       con bust de cache. Auto-curado sin que el usuario tenga que
       hacer nada.
       ============================================================ */
  <script>
    (function () {
      var RECOVERY_TIMEOUT_MS = 8000;
      var RECOVERY_KEY = 'boletera_recovery_attempt';

      function nukeAndReload(reason) {
        // Evita loop infinito: solo intenta auto-recovery una vez por sesión
        try {
          if (sessionStorage.getItem(RECOVERY_KEY)) {
            console.warn('[auto-recovery] ya se intentó antes, no recargar de nuevo');
            return;
          }
          sessionStorage.setItem(RECOVERY_KEY, String(Date.now()));
        } catch (e) {}

        console.warn('[auto-recovery] disparado por:', reason, '— limpiando todo y recargando');

        var ops = [];

        // 1) Desregistrar service workers
        if ('serviceWorker' in navigator) {
          ops.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          }).catch(function () {}));
        }

        // 2) Limpiar caches API (PWA cache)
        if ('caches' in window) {
          ops.push(caches.keys().then(function (names) {
            return Promise.all(names.map(function (n) { return caches.delete(n); }));
          }).catch(function () {}));
        }

        Promise.all(ops).then(function () {
          // Recarga con timestamp para esquivar cache del browser
          var sep = location.href.indexOf('?') >= 0 ? '&' : '?';
          location.replace(location.href + sep + '_r=' + Date.now());
        });
      }

      // Listener global: cualquier error de carga de chunk JS dispara recovery
      window.addEventListener('error', function (ev) {
        var src = ev.target && (ev.target.src || ev.target.href);
        if (!src) return;
        // Si falló un script o un asset .js que es de Angular
        if (/\.(js|css)(\?|$)/.test(src) && (
          src.indexOf('chunk-') >= 0 ||
          src.indexOf('main-') >= 0 ||
          src.indexOf('polyfills-') >= 0 ||
          src.indexOf('styles-') >= 0
        )) {
          nukeAndReload('asset 404: ' + src);
        }
      }, true);

      // Timeout: si después de N segundos Angular sigue sin bootstrappear,
      // asumir que algo está mal y auto-recuperar
      setTimeout(function () {
        if (!document.body.classList.contains('booted')) {
          nukeAndReload('timeout ' + RECOVERY_TIMEOUT_MS + 'ms sin bootstrap');
        }
      }, RECOVERY_TIMEOUT_MS);
    })();
  </script>

  <!-- Splash pre-bootstrap visible mientras Angular carga. Solo se muestra
       en rutas públicas (controlado por script más abajo). En el admin
       queda oculto inmediatamente. -->

    <div class="public-splash__loader"></div>

      Cargando tu rifa...<br>
      <small style="opacity:0.7">Esto puede tardar unos segundos la primera vez.</small>
    </div>
  </div>
  <script>
    // Solo activa el splash en rutas públicas (escaneadas desde QR físico
    // o compartidas por WhatsApp/redes). En /admin, /seller, /login etc.
    // el bg dark normal carga al instante.
    (function () {
      var p = location.pathname || '/';
      var isPublic = /^\/(r|rifa|rifas|verify|mi-boleta)(\/|$|\?)/.test(p) || p === '/';
      if (isPublic) {
        var splash = document.getElementById('public-splash');
        if (splash) splash.style.display = 'flex';
      }
    })();
  </script>
