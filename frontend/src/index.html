  <!-- CRÍTICO: base href="/" hace que las URLs relativas de <script> y assets
       (main-*.js, chunk-*.js, polyfills-*.js, favicon.svg, manifest.webmanifest)
       resuelvan SIEMPRE desde la raíz del sitio, no relativas a la ruta actual.
       Sin esto, al entrar directo por URL con múltiples segmentos como
       /rifa/3/comprar, el navegador pedía /rifa/3/main-Q22J6HGD.js — Vercel
       respondía con index.html (SPA fallback) en lugar de JS, Chrome rechazaba
       el módulo por MIME type "text/html", Angular nunca bootstrappeaba y el
       splash quedaba pegado en loop infinito. -->

  <!-- ============================================================
       PERFORMANCE: preconnect a Google Fonts
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500&display=swap">

  <!-- Material Icons cargado async -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" media="print" onload="this.onload=null;this.media='all'"
        href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <!-- Evita el flash del nombre del ícono como texto plano antes de que
       cargue la fuente Material Icons. Se activa con clase en body. -->
  <style>
    body:not(.icons-ready) .material-icons { visibility: hidden; }

    /* ============================================================
       PRE-BOOTSTRAP SPLASH para landing pages públicas (/r/:id, /rifa/:id)
       Las rutas escaneadas desde QR físico se abren en webviews lentos
       de WhatsApp/Instagram. El bundle Angular tarda en cargar y mientras
       tanto el body sale negro (color base del admin). Resultado: el
       usuario que escanea el QR ve una pantalla negra y cierra antes de
       que la app monte.

       Fix: para rutas públicas, mostrar splash claro INMEDIATO con el
       branding y un loading. Cuando Angular monta y reemplaza <app-root>,
       el splash desaparece naturalmente. Para rutas de admin, no hacemos
       nada (sigue el bg dark normal).
       ============================================================ */
    .public-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: linear-gradient(180deg, #faf6ee 0%, #f0e5c8 100%);
      color: #1a2942;
      font-family: 'Inter', system-ui, sans-serif;
      z-index: 0;
    }
    .public-splash__brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }
    .public-splash__dot {
      width: 12px; height: 12px;
      background: #1ec77b;
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(30, 199, 123, 0.2);
    }
    .public-splash__loader {
      width: 36px; height: 36px;
      border: 3px solid rgba(26, 41, 66, 0.12);
      border-top-color: #c9a96e;
      border-radius: 50%;
      animation: public-spin 0.8s linear infinite;
    }
    .public-splash__msg {
      font-size: 13px;
      color: rgba(26, 41, 66, 0.65);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
    @keyframes public-spin { to { transform: rotate(360deg); } }
    /* Cuando Angular monta, agrega .booted al body y el splash se oculta.
       IMPORTANTE: !important es OBLIGATORIO porque el splash tiene
       style="display: flex" inline (seteado por JS al detectar ruta
       pública). Los estilos inline ganan por specificity sobre reglas
       CSS de clase — sin !important, esta regla nunca se aplica y el
       splash queda visible sobre la app aunque Angular haya cargado. */
    body.booted .public-splash { display: none !important; }
  </style>
  <script>
    (function () {
      function markReady() {
        if (document.body) document.body.classList.add('icons-ready');
      }
      function setup() {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(markReady);
          setTimeout(markReady, 1500);
        } else {
          setTimeout(markReady, 1000);
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }

      // Marca body.booted cuando Angular renderiza algo dentro de app-root,
      // para ocultar el splash pre-bootstrap. Usa MutationObserver para
      // detectar el primer hijo agregado al app-root.
      //
      // IMPORTANTE: además de agregar body.booted (para la regla CSS),
      // limpiamos el estilo INLINE display:flex del splash directamente
      // vía JS. Sin esto, aunque agreguemos body.booted, el splash seguía
      // visible porque el style inline (seteado más abajo por el script
      // que activa el splash en rutas públicas) tiene mayor specificity
      // que cualquier regla CSS de clase.
      function hideSplash() {
        document.body.classList.add('booted');
        var splash = document.getElementById('public-splash');
        if (splash) splash.style.display = 'none';
      }

      var bootedObserver = null;
      function watchBoot() {
        var root = document.querySelector('app-root');
        if (!root) { setTimeout(watchBoot, 100); return; }
        if (root.children && root.children.length > 0) {
          hideSplash();
          return;
        }
        bootedObserver = new MutationObserver(function () {
          if (root.children && root.children.length > 0) {
            hideSplash();
            bootedObserver.disconnect();
          }
        });
        bootedObserver.observe(root, { childList: true });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', watchBoot);
      } else {
        watchBoot();
      }
    })();
  </script>

  <!-- ============================================================
       AUTO-RECOVERY del cache obsoleto (v2 — sin loops).

       Historia: la v1 tenía un setTimeout de 8s que disparaba
       nukeAndReload si Angular no había bootstrappeado. Cuando Render
       hace cold start (30s+ para responder) o sessionStorage está
       deshabilitado (modo privado, PWA en cierto webviews), el flag
       anti-loop fallaba y la app entraba en un loop infinito de
       reloads/spinner sin cargar nunca.

       v2 mucho más conservador:
         - Elimina el timeout automático.
         - Solo dispara recovery si hay un error CONCRETO de carga de
           asset (chunk-XXX.js 404, etc.) — el escenario original que
           motivó el auto-recovery.
         - Requiere sessionStorage funcional: si no está disponible,
           NO se hace recovery (mejor que loop).
       ============================================================ */
  <script>
    (function () {
      var RECOVERY_KEY = 'boletera_recovery_attempt';

      function sessionStorageWorks() {
        try {
          var k = '__ss_probe__';
          sessionStorage.setItem(k, '1');
          sessionStorage.removeItem(k);
          return true;
        } catch (e) {
          return false;
        }
      }

      function nukeAndReload(reason) {
        // Sin sessionStorage no podemos garantizar single-attempt → no reload.
        // Es MUCHO mejor mostrar spinner un rato que entrar en loop.
        if (!sessionStorageWorks()) {
          console.warn('[auto-recovery] sessionStorage no disponible, no reload por seguridad');
          return;
        }
        if (sessionStorage.getItem(RECOVERY_KEY)) {
          console.warn('[auto-recovery] ya se intentó antes, no recargar de nuevo');
          return;
        }
        sessionStorage.setItem(RECOVERY_KEY, String(Date.now()));

        console.warn('[auto-recovery] disparado por:', reason, '— limpiando todo y recargando');

        var ops = [];
        if ('serviceWorker' in navigator) {
          ops.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          }).catch(function () {}));
        }
        if ('caches' in window) {
          ops.push(caches.keys().then(function (names) {
            return Promise.all(names.map(function (n) { return caches.delete(n); }));
          }).catch(function () {}));
        }

        Promise.all(ops).then(function () {
          var sep = location.href.indexOf('?') >= 0 ? '&' : '?';
          location.replace(location.href + sep + '_r=' + Date.now());
        });
      }

      // Solo dispara recovery en error REAL de carga de chunk/main/polyfills.
      // NO hay timeout automático — Render cold start puede tardar 30s+ y
      // eso no debe disparar recovery.
      window.addEventListener('error', function (ev) {
        var src = ev.target && (ev.target.src || ev.target.href);
        if (!src) return;
        if (/\.(js|css)(\?|$)/.test(src) && (
          src.indexOf('chunk-') >= 0 ||
          src.indexOf('main-') >= 0 ||
          src.indexOf('polyfills-') >= 0 ||
          src.indexOf('styles-') >= 0
        )) {
          nukeAndReload('asset 404: ' + src);
        }
      }, true);

      // Limpia el flag de recovery cuando Angular bootstrappea bien.
      // Así en la próxima sesión (si volviera a haber deploy con chunks
      // nuevos) el recovery puede dispararse otra vez.
      var cleanupInterval = setInterval(function () {
        if (document.body.classList.contains('booted')) {
          clearInterval(cleanupInterval);
          try { sessionStorage.removeItem(RECOVERY_KEY); } catch (e) {}
        }
      }, 1000);
    })();
  </script>
</head>
<body class="mat-typography">
  <!-- Splash pre-bootstrap visible mientras Angular carga. Solo se muestra
       en rutas públicas (controlado por script más abajo). En el admin
       queda oculto inmediatamente. -->
  <div class="public-splash" id="public-splash" style="display:none">
    <div class="public-splash__brand">
      <span class="public-splash__dot"></span>
      <span>Boletera</span>
    </div>
    <div class="public-splash__loader"></div>
    <div class="public-splash__msg">
      Cargando tu rifa...<br>
      <small style="opacity:0.7">Esto puede tardar unos segundos la primera vez.</small>
    </div>
  </div>
  <script>
    // Solo activa el splash en rutas públicas (escaneadas desde QR físico
    // o compartidas por WhatsApp/redes). En /admin, /seller, /login etc.
    // el bg dark normal carga al instante.
    (function () {
      var p = location.pathname || '/';
      var isPublic = /^\/(r|rifa|rifas|verify|mi-boleta|mi-cuenta)(\/|$|\?)/.test(p) || p === '/';
      if (isPublic) {
        var splash = document.getElementById('public-splash');
        if (splash) splash.style.display = 'flex';
      }
    })();
  </script>
  <app-root></app-root>
</body>
</html>
