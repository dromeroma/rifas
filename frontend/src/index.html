<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Boletera · Tu rifa, profesional desde el primer ticket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e8e54">
  <meta name="description" content="Boletera vuelve cualquier rifa en un negocio profesional. Boletas únicas con QR, comisiones automáticas, verificación pública y trazabilidad total. Hecho en Colombia." />
  <meta property="og:title" content="Boletera · Tu rifa, profesional desde el primer ticket" />
  <meta property="og:description" content="Vende tus rifas sin perder cuentas. Boletas únicas, comisiones automáticas, pagos con comprobante y verificación pública por QR." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Boletera">

  <!-- Preconnect a Google Fonts para arrancar el TLS antes de pedir los CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!--
    Inter ya soporta &display=swap → texto visible inmediatamente con fallback
    mientras carga la fuente real.
  -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

  <!--
    Material Icons cargado de forma asíncrona para no bloquear el render
    inicial. Trick: media="print" carga sin block; onload lo activa al
    cargar. Fallback con noscript para JS deshabilitado.
  -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" media="print" onload="this.onload=null;this.media='all'"
        href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"></noscript>

  <!-- Evita el flash del nombre del ícono como texto plano antes de que
       cargue la fuente Material Icons. Se activa con clase en body. -->
  <style>
    body:not(.icons-ready) .material-icons { visibility: hidden; }
  </style>
  <script>
    (function () {
      function markReady() {
        if (document.body) document.body.classList.add('icons-ready');
      }
      // Si el body ya existe (improbable a esta altura) y la API está,
      // espera a font-ready. Si no, intenta con DOMContentLoaded.
      function setup() {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(markReady);
          // Fallback duro: máximo 1.5s para no dejar invisibles los íconos.
          setTimeout(markReady, 1500);
        } else {
          setTimeout(markReady, 1000);
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }
    })();
  </script>
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
