  <!-- Material Icons cargado async -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/icon?family=Material+Icons">

        href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <!-- Evita el flash del nombre del ícono como texto plano antes de que
       cargue la fuente Material Icons. Se activa con clase en body. -->
  <style>
    body:not(.icons-ready) .material-icons { visibility: hidden; }
  </style>
  <script>
    (function () {
      function markReady() {
        if (document.body) document.body.classList.add('icons-ready');
      }
      function setup() {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(markReady);
          setTimeout(markReady, 1500);
        } else {
          setTimeout(markReady, 1000);
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }
    })();
  </script>
